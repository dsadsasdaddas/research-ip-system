name: CI

on:
  push:
  pull_request:

jobs:
  backend-rust-bridge:
    name: Backend TypeScript + Rust search bridge
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '25'
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Run backend CI
        working-directory: backend
        run: npm run ci
