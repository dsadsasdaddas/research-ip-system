# 前端 nginx 站点配置
# - 静态文件来自 /usr/share/nginx/html(vite build 产物)
# - /api 反代到后端容器 backend:3001(同源,规避跨域)
server {
    listen       80;
    listen  [::]:80;
    server_name  _;

    # 静态资源上传体积(论文摘要/附件代理等),适当放宽
    client_max_body_size 100m;

    root   /usr/share/nginx/html;
    index  index.html;

    # 单页应用路由回退到 index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # /api 反代到后端容器(docker compose 网络内服务名 backend)
    location /api/ {
        proxy_pass         http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml text/xml image/svg+xml;
    gzip_min_length 1024;
}
